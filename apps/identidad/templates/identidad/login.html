{% extends "base.html" %}
{% block title %}Iniciar sesión — StockIA{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow p-8">
  <h1 class="text-2xl font-bold text-blue-700 mb-6 text-center">StockIA</h1>

  <form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Usuario</label>
      <input type="text" name="username" required
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
      <input type="password" name="password" required
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <button type="submit"
      class="w-full bg-blue-700 text-white py-2 rounded-lg font-medium hover:bg-blue-800 transition">
      Ingresar
    </button>
  </form>

  <p class="text-center text-sm text-gray-500 mt-4">
    ¿No tienes cuenta?
    <a href="{% url 'identidad:registro' %}" class="text-blue-700 hover:underline">Regístrate</a>
  </p>
</div>
{% endblock %}
